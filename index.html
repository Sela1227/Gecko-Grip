<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gecko Grip V0.6.1 — 英文單字記憶</title>

<!-- SELA Favicon Set -->
<link rel="icon" type="image/svg+xml"   href="favicon/sela.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180"    href="favicon/apple-touch-icon.png">
<link rel="manifest"                            href="favicon/site.webmanifest">
<meta name="theme-color" content="#F36825">

<style>
/* ── SELA Starter Kit 規範色盤 ── */
:root {
  /* 品牌色 */
  --sela-orange: #F36825;
  --sela-white:  #FFFFFF;

  /* 北歐霧藍主題（工具類，Kit 預設） */
  --primary:   #5A7A8B;
  --secondary: #9AB0BC;
  --bg:        #FAFBFC;
  --text:      #4A5B6A;
  --muted:     #7A8B9A;
  --border:    #E5E9EE;
  --bg-card:   #FFFFFF;
  --bg-subtle: #EEF2F5;

  /* 功能色（grade 按鈕，刻意留彩度以強化 UX 分辨性） */
  --ok:      #A3BE8C;
  --ok-dark: #7A9C63;
  --no:      #BF616A;
  --no-dark: #A54E58;

  /* 自訂 accent */
  --med:   #7B5EA7;  /* 醫學詞彙 tab */
  --amber: #C8913A;  /* 拼字測試 */

  /* 字型（Kit reference-static-pages 規範 fallback chain） */
  --serif: Charter, "Iowan Old Style", Georgia, serif;
  --sans:  system-ui, -apple-system, "Microsoft JhengHei",
           "PingFang TC", "Noto Sans CJK TC", "Segoe UI", sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:20px 16px 60px}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:10px}
.brand img{width:32px;height:32px;border-radius:6px;flex:none}
.brand-text h1{font-size:16px;font-weight:700;letter-spacing:.04em;color:var(--text)}
.brand-text .ver{font-size:11px;color:var(--muted);margin-top:1px}
.streak{font-size:12px;color:var(--muted);background:var(--bg-card);
  border:1px solid var(--border);border-radius:99px;padding:5px 12px}

/* DECK TABS */
.deck-tabs{display:flex;gap:8px;margin-bottom:14px}
.dtab{flex:1;padding:11px 8px;border:1.5px solid var(--border);border-radius:11px;
  background:var(--bg-card);font-family:var(--sans);font-size:13px;font-weight:600;
  cursor:pointer;color:var(--muted);transition:all .15s;text-align:center}
.dtab:hover:not(.active){border-color:var(--muted)}
.dtab.active.gen{border-color:var(--primary);color:var(--primary);background:#EEF3F8}
.dtab.active.med{border-color:var(--med);color:var(--med);background:#F3EEF8}

/* PANELS */
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  padding:18px;margin-bottom:14px}
.panel h2{font-size:12px;font-weight:700;color:var(--muted);
  letter-spacing:.08em;margin-bottom:12px;text-transform:uppercase}
.due-row{display:flex;gap:10px}
.due-cell{flex:1;text-align:center;padding:12px 4px;
  border:1px solid var(--border);border-radius:10px}
.due-cell b{display:block;font-size:26px;font-family:var(--serif)}
.due-cell small{font-size:11px;color:var(--muted)}
.due-cell.hot b{color:var(--primary)}

/* LADDER */
.ladder{display:flex;align-items:flex-end;gap:8px;height:96px;margin-top:4px}
.rung{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px}
.rung .bar{width:100%;background:linear-gradient(180deg,var(--secondary),var(--primary));
  border-radius:5px 5px 0 0;min-height:4px;transition:height .5s}
.rung.mastered .bar{background:linear-gradient(180deg,#B8CFA4,var(--ok))}
.rung small{font-size:10px;color:var(--muted);white-space:nowrap}
.rung b{font-size:11px}

/* BUTTONS */
.btn{display:block;width:100%;border:none;border-radius:12px;padding:14px;
  font-size:15px;font-weight:700;font-family:var(--sans);cursor:pointer;
  transition:transform .08s,filter .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{filter:brightness(1.07)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);
  font-weight:500;font-size:13px;padding:10px}
.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn[disabled]{opacity:.4;cursor:default}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;
  padding:20px 18px 16px;display:flex;flex-direction:column;
  box-shadow:0 4px 20px rgba(90,122,139,.08);min-height:380px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.ctag{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:99px;
  border:1px solid;white-space:nowrap}
.ctag.gen{color:var(--primary);border-color:var(--primary)}
.ctag.med{color:var(--med);border-color:var(--med)}
.ctag.cat{color:var(--muted);border-color:var(--border);font-weight:500}
.boxtag{font-size:10.5px;padding:3px 9px;border:1px solid var(--border);
  border-radius:99px;color:var(--muted);white-space:nowrap}
.boxtag.new{color:var(--sela-orange);border-color:var(--sela-orange)}
.boxtag.lapse{color:var(--no);border-color:var(--no)}
.ladder-note{font-size:11px;color:var(--muted);text-align:center;
  margin-top:10px;padding-top:9px;border-top:1px dashed var(--border);line-height:1.6}
.ladder-note b{color:var(--no);font-weight:600}
.ladder-note:empty{display:none}

/* ── ENGLISH SECTION (always visible) ── */
.en-section{text-align:center;padding:14px 4px 12px}
.en-word{font-family:var(--serif);font-size:clamp(32px,9vw,50px);font-weight:400;
  color:var(--text);line-height:1.15;margin-bottom:8px;word-break:break-word;
  transition:font-size .25s,color .25s}
.en-word.sm{font-size:clamp(20px,5vw,26px);color:var(--muted)}
.en-mask{font-family:var(--serif);font-size:clamp(20px,5vw,26px);
  color:var(--amber);letter-spacing:.18em;line-height:1.15;margin-bottom:8px;
  word-break:break-word;min-height:1.15em}
.en-mask .sp{display:inline-block;width:.6em}
.en-mask-hint{font-size:11px;color:var(--amber);margin-bottom:8px}
.phon-row{display:flex;align-items:center;justify-content:center;gap:10px}
.phon-row .phon{font-family:var(--serif);font-size:14px;color:var(--muted)}
.phon-row .asrc{font-size:10px;color:var(--muted)}
.speak-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg-card);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.speak-btn:hover{border-color:var(--primary)}
.speak-btn.human{border-color:var(--primary);color:var(--primary)}
.rank-hint{font-size:11px;color:var(--muted);margin-top:6px}

/* ── MYSTERY ── */
.mystery{flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;padding:16px 0}
.mystery-dots{font-size:26px;letter-spacing:10px;color:var(--border)}
.mystery-hint{font-size:12px;color:var(--border)}

/* ── CARD SEPARATOR ── */
.card-sep{height:1px;
  background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 6px,transparent 6px,transparent 12px);
  margin:14px 0}

/* ── CHINESE REVEAL ── */
.zh-answer{text-align:center;padding:8px 0 12px}
.zh-word{font-size:clamp(30px,8vw,44px);font-weight:700;
  color:var(--text);margin-bottom:6px;word-break:break-all}
.zh-sub{font-size:13px;color:var(--muted);font-style:italic;font-family:var(--serif)}
.card-defs{font-size:13px;line-height:1.65;color:var(--text);padding-top:10px;
  overflow-y:auto;max-height:130px;border-top:1px solid var(--border);margin-top:6px}
.card-defs .pos{color:var(--primary);font-style:italic;font-weight:600;
  margin-right:4px;font-family:var(--serif)}
.card-defs li{margin:0 0 5px 16px}
.card-defs .nodef{color:var(--muted);font-size:12.5px;padding:6px 0}
.card-defs a{color:var(--primary);font-size:11.5px;text-decoration:none;border-bottom:1px dotted}

/* ── TYPING ZONE ── */
.typing-zone{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.typing-zone-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.typing-toggle{background:none;border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;font-size:12.5px;font-family:var(--sans);
  color:var(--muted);cursor:pointer;transition:all .15s;flex:none}
.typing-toggle:hover{border-color:var(--amber);color:var(--amber)}
.typing-toggle.open{border-color:var(--amber);color:var(--amber);background:#FDF6EE}
.typing-hint{font-size:11px;color:var(--muted)}
.typing-input-row{display:flex;gap:8px;margin-top:8px}
.typing-input-row input{flex:1;padding:8px 11px;border:1.5px solid var(--border);
  border-radius:8px;font-size:14px;font-family:var(--sans);
  color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.typing-input-row input:focus{border-color:var(--primary)}
.btn-check{background:var(--primary);color:#fff;border:none;border-radius:8px;
  padding:8px 14px;font-family:var(--sans);font-size:13px;font-weight:700;
  cursor:pointer;flex:none}
.btn-check:active{filter:brightness(.9)}
.typing-fb{font-size:13px;margin-top:6px;min-height:18px}
.ok-text{color:var(--ok-dark);font-weight:600}
.no-text{color:var(--no)}

/* ── GRADE BUTTONS ── */
.grade{display:flex;gap:10px;margin-top:14px}
.grade .btn{flex:1}
.g-no{background:var(--no);color:#fff}.g-no:hover{background:var(--no-dark)}
.g-ok{background:var(--ok);color:#fff}.g-ok:hover{background:var(--ok-dark)}
.grade .btn small{display:block;font-weight:400;font-size:11px;opacity:.85;margin-top:2px}

/* ── PROGRESS ── */
.pbar{height:5px;background:var(--border);border-radius:99px;margin-bottom:10px;overflow:hidden}
.pbar i{display:block;height:100%;background:var(--primary);border-radius:99px;transition:width .3s}
.sess-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}

/* SUMMARY */
.summary{text-align:center;padding:28px 0}
.summary .big{font-family:var(--serif);font-size:52px;margin:8px 0}
.summary p{color:var(--muted);font-size:14px;margin-bottom:6px}

/* SETTINGS */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;margin-bottom:6px}
.field input,.field select{width:100%;padding:9px;border:1px solid var(--border);
  border-radius:9px;font-size:14px;font-family:var(--sans);
  background:var(--bg-card);color:var(--text)}
.field .hint{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5}
.row2{display:flex;gap:12px}.row2>.field{flex:1}
.io-row{display:flex;gap:10px}.io-row .btn{flex:1}

/* MISC */
.hidden{display:none!important}
.kbd-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:10px}
kbd{border:1px solid var(--border);background:var(--bg-card);border-radius:4px;padding:1px 5px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#FAFBFC;padding:10px 18px;border-radius:99px;
  font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9}
.toast.show{opacity:1}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">
    <img src="assets/sela.svg" alt="SELA" width="32" height="32">
    <div class="brand-text">
      <h1>Gecko Grip</h1>
      <div class="ver" id="ver-display">英文單字記憶 · V0.6.1</div>
    </div>
  </div>
  <div class="streak" id="streak">—</div>
</header>

<!-- ═══ HOME ═══ -->
<div id="view-home">
  <div class="deck-tabs">
    <button class="dtab gen" id="tab-gen">📖 通用英文 (萬字)</button>
    <button class="dtab med" id="tab-med">🏥 醫學詞彙</button>
  </div>
  <div class="panel">
    <h2>今日任務</h2>
    <div class="due-row">
      <div class="due-cell hot"><b id="stat-due">0</b><small>到期複習</small></div>
      <div class="due-cell"><b id="stat-new">0</b><small>新字</small></div>
      <div class="due-cell"><b id="stat-mastered">0</b><small>精通 Box5</small></div>
    </div>
  </div>
  <div class="panel">
    <h2>LEITNER 記憶階梯 · 已學 <span id="stat-total">0</span> 字</h2>
    <div class="ladder" id="ladder"></div>
    <div class="ladder-note" id="lapse-note"></div>
  </div>
  <button class="btn btn-primary" id="btn-start" style="margin-bottom:10px">開始練習</button>
  <button class="btn btn-ghost" id="btn-settings">設定 · 進度備份</button>
</div>

<!-- ═══ PRACTICE ═══ -->
<div id="view-practice" class="hidden">
  <div class="sess-meta"><span id="sess-count"></span><span id="sess-wrong"></span></div>
  <div class="pbar"><i id="sess-bar" style="width:0%"></i></div>

  <div class="card">
    <div class="card-top">
      <div class="card-tags">
        <span class="ctag" id="card-dtag"></span>
        <span class="ctag cat hidden" id="card-cat"></span>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        <span class="boxtag lapse hidden" id="card-lapse"></span>
        <span class="boxtag" id="card-box"></span>
      </div>
    </div>

    <!-- ① English (always visible) -->
    <div class="en-section">
      <div class="en-word" id="en-word">—</div>
      <div class="en-mask hidden" id="en-mask"></div>
      <div class="en-mask-hint hidden" id="en-mask-hint">英文已遮蔽 — 憑記憶拼寫</div>
      <div class="phon-row">
        <span class="phon" id="en-phon"></span>
        <button class="speak-btn" id="btn-audio" title="播放發音 (P)">🔊</button>
        <span class="asrc" id="audio-src"></span>
      </div>
      <div class="rank-hint" id="rank-hint"></div>
    </div>

    <!-- ② Mystery (before reveal) -->
    <div class="mystery" id="mystery">
      <div class="mystery-dots">· · · · ·</div>
      <div class="mystery-hint">中文遮蔽中</div>
    </div>

    <!-- ③ Reveal (after Space) -->
    <div class="reveal-section hidden" id="reveal-section">
      <div class="card-sep"></div>
      <div class="zh-answer">
        <div class="zh-word" id="zh-word"></div>
        <div class="zh-sub" id="zh-sub"></div>
      </div>
      <div class="card-defs" id="card-defs"></div>
      <div class="typing-zone">
        <div class="typing-zone-row">
          <button class="typing-toggle" id="btn-typing">✏️ 測試拼字 (T)</button>
          <span class="typing-hint">可選 — 開啟時英文會遮蔽，憑記憶拼寫</span>
        </div>
        <div class="typing-input-row hidden" id="typing-row">
          <input type="text" id="typing-input" placeholder="拼寫英文單字…"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button class="btn-check" id="btn-check">確認</button>
        </div>
        <div class="typing-fb" id="typing-fb"></div>
      </div>
    </div>
  </div>

  <div class="grade" id="grade-reveal" style="margin-top:14px">
    <button class="btn btn-primary" id="btn-reveal">
      顯示中文意思<small>Space</small>
    </button>
  </div>
  <div class="grade hidden" id="grade-answer">
    <button class="btn g-no" id="btn-no">不認得<small>之後再考 · 1</small></button>
    <button class="btn g-ok" id="btn-ok">認識<small>拉長間隔 · 2</small></button>
  </div>

  <div class="kbd-hint">
    <kbd>Space</kbd>顯示中文　<kbd>1</kbd>不認得　<kbd>2</kbd>認識　<kbd>P</kbd>發音　<kbd>T</kbd>拼字
  </div>
  <button class="btn btn-ghost" id="btn-quit" style="margin-top:12px">結束本回合</button>
</div>

<!-- ═══ DONE ═══ -->
<div id="view-done" class="hidden">
  <div class="panel summary">
    <p>本回合完成</p>
    <div class="big" id="done-count">0</div>
    <p id="done-detail"></p>
    <p id="done-next" style="margin-top:8px;font-size:13px"></p>
  </div>
  <button class="btn btn-primary" id="btn-again" style="margin-bottom:10px">再來一回合</button>
  <button class="btn btn-ghost" id="btn-home2">回到首頁</button>
</div>

<!-- ═══ SETTINGS ═══ -->
<div id="view-settings" class="hidden">
  <div class="panel">
    <h2>通用英文 · 學習範圍</h2>
    <div class="row2">
      <div class="field"><label>詞頻起（1 = 最常用）</label>
        <input type="number" id="set-from" min="1" max="9858" value="101"></div>
      <div class="field"><label>詞頻迄</label>
        <input type="number" id="set-to" min="1" max="9858" value="3000"></div>
    </div>
    <div class="field"><div class="hint">建議 101–3000 起步（前 100 多為 the/of/and 等功能詞）。</div></div>
    <div class="row2">
      <div class="field"><label>每回合新字</label>
        <input type="number" id="set-new" min="0" max="50" value="10"></div>
      <div class="field"><label>複習上限</label>
        <input type="number" id="set-rev" min="5" max="200" value="40"></div>
    </div>
    <div class="field">
      <label>發音口音（備援語音）</label>
      <select id="set-accent">
        <option value="en-US">美式 en-US</option>
        <option value="en-GB">英式 en-GB</option>
      </select>
      <div class="hint">優先播放字典真人錄音；離線或查無時改用系統語音。</div>
    </div>
  </div>
  <div class="panel">
    <h2>進度備份</h2>
    <div class="io-row">
      <button class="btn btn-ghost" id="btn-export">匯出 JSON</button>
      <button class="btn btn-ghost" id="btn-import">匯入 JSON</button>
    </div>
    <input type="file" id="file-import" accept=".json" class="hidden">
    <div class="field" style="margin-top:10px">
      <div class="hint">進度存於瀏覽器 localStorage，零帳號、零 PII。換裝置請先匯出。</div>
    </div>
  </div>
  <button class="btn btn-primary" id="btn-save">儲存並返回</button>
</div>

<div class="toast" id="toast"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   Gecko Grip V0.6.1 — 英文單字記憶
   命名源自壁虎腳掌的 van der Waals 抓力：單字牢牢黏住不放
   英文顯示 → 中文遮蔽 → Space 揭示中文
   揭示後可選：T 測試拼字 或 直接 1/2 評分
   Leitner 五盒：Box1每日 / Box2隔日 / Box3三天 / Box4週 / Box5精通
   ═══════════════════════════════════════════════════════ */

const VERSION = "V0.6.1";

/* ── Leitner ── */
const BOX_DAYS  = [0,1,3,7,14,30];       // 索引=盒號，值=間隔天數（唯一真相）

/* 標籤一律由 BOX_DAYS 衍生，不另寫一份字串表。
   V0.5.1 以前手寫的 "Box2·隔日" 實際是 3 天、"Box3·三天" 實際是 7 天 —— 標籤與資料漂移（坑 P10）*/
const BOX_LABEL = b => b ? `Box${b}·${BOX_DAYS[b]}天` : "新字";
const BOX_SHORT = b => `Box${b}`;

/* 失誤懲罰：錯過的字間隔縮短，且永遠不會拉到跟沒錯過的字一樣長。
   索引 = 累計答錯次數（上限 3）。Box5 為例：0錯→30天、1錯→21天、2錯→17天、3錯以上→14天 */
const LAPSE_MULT = [1, .7, .55, .45];

const REQUEUE_GAP = 4;
const DAY = 86400000;

/* 這張卡下次該隔幾天：盒號決定基準、累計失誤次數決定縮短幅度 */
function intervalDays(box, wrong){
  const mult = LAPSE_MULT[Math.min(wrong||0, LAPSE_MULT.length-1)];
  return Math.max(1, Math.round(BOX_DAYS[box] * mult));
}

const defCache={};

/* 這些定義對背單字沒有價值：它們只是說「這個拼法是另一個字的變體」，
   不是這個字本身的意思。dictionaryapi.dev 會把它們跟正常定義混在一起回。*/
const NOISE_DEF=/^(eye dialect|alternative (form|spelling|term)|obsolete (form|spelling)|misspelling|archaic (form|spelling)|dated form|nonstandard (form|spelling)|pronunciation spelling|informal spelling|abbreviation of|initialism of|clipping of|synonym of)\b/i;

async function lookup(word){
  if(defCache[word])return defCache[word];
  try{
    const r=await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(word));
    if(!r.ok)throw 0;
    const j=await r.json();

    /* 只取第一筆 entry。同形異義詞（如 year 同時是「年」與 here/hear 的方言拼法）
       會被 API 拆成多筆 entry 回傳，全部混抓會讓「年」跟「這個地方」並列。*/
    const e0=j[0]||{};

    /* 音標與錄音優先取 e0；e0 沒有才往後找（後面 entry 拼法相同，發音檔仍可用）*/
    let audio="",phon="";
    for(const p of(e0.phonetics||[])){if(!audio&&p.audio)audio=p.audio;if(!phon&&p.text)phon=p.text;}
    if(!audio||!phon){
      for(const e of j.slice(1)){for(const p of(e.phonetics||[])){
        if(!audio&&p.audio)audio=p.audio;if(!phon&&p.text)phon=p.text;}}
    }

    /* 同詞性合併成一組（API 可能拆成多個 meanings 物件），避免畫面連續三個 noun */
    const byPos=new Map();
    for(const m of(e0.meanings||[])){
      const all=(m.definitions||[]).map(d=>d.definition).filter(Boolean);
      let defs=all.filter(d=>!NOISE_DEF.test(d.trim()));
      if(!defs.length)defs=all;              // 整組都被濾掉就退回原始，總比空白好
      if(!defs.length)continue;
      byPos.set(m.partOfSpeech,[...(byPos.get(m.partOfSpeech)||[]),...defs]);
    }
    const meanings=[...byPos.entries()].slice(0,3)
      .map(([pos,defs])=>({pos,defs:[...new Set(defs)].slice(0,2)}));

    return defCache[word]={audio,phon,meanings};
  }catch(e){return defCache[word]={audio:"",phon:"",meanings:[]};}
}
let curAudio="";
const audioEl=new Audio();
function speak(word,url){if(url){audioEl.src=url;audioEl.play().catch(()=>tts(word));}else tts(word);}
function tts(word){
  if(!("speechSynthesis"in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang=S.settings.accent;u.rate=.88;
  const vs=speechSynthesis.getVoices().filter(v=>v.lang.startsWith(S.settings.accent));
  const nat=vs.find(v=>/natural|neural|premium|enhanced/i.test(v.name));
  if(nat||vs[0])u.voice=nat||vs[0];
  speechSynthesis.speak(u);
}
if("speechSynthesis"in window)speechSynthesis.getVoices();

/* ── Scheduler ── */
function dueCards(){
  const t=today(),p=pfx();
  return Object.entries(S.cards)
    .filter(([k,c])=>k.startsWith(p)&&c.next<=t)
    .sort((a,b)=>a[1].box-b[1].box||a[1].next-b[1].next)
    .map(([k])=>k.slice(p.length));
}
function newCandidates(n){
  const p=pfx(),out=[];
  if(S.deck==="medical"){
    for(const m of MEDICAL){if(!S.cards[p+m.w]){out.push(m.w);if(out.length>=n)break;}}
  }else{
    const {from,to}=S.settings;
    for(let i=from-1;i<Math.min(to,WORDS.length)&&out.length<n;i++){
      const w=WORDS[i];if(!S.cards[p+w])out.push(w);}
  }
  return out;
}
/* relearn = 這張卡在「本回合」已經答錯過（現在是補考）。
   剛看過答案 4 張前就答對，那是短期記憶不是長期記憶，不給升級。*/
function grade(word,ok,relearn){
  const key=cardKey(word),t=today();
  let c=S.cards[key]||{box:0,next:t,seen:0,wrong:0,added:t};
  c.seen++;
  if(!ok){
    c.box=1;c.wrong++;c.next=t;              // 答錯：打回 Box1，本回合稍後補考、今日內仍到期
  }else if(relearn){
    c.box=1;c.next=t+DAY;                    // 補考答對：停在 Box1，明天再考一次（不給白吃的升級）
  }else{
    c.box=Math.min(5,c.box+1);
    c.next=t+intervalDays(c.box,c.wrong)*DAY;// 正常答對：升盒，但間隔受累計失誤懲罰
  }
  S.cards[key]=c;saveS();
}

/* ── Session ── */
let queue=[],qIdx=0,sessTotal=0,sessWrong=new Set(),sessDone=0,revealed=false;
function buildSession(){
  const rev=dueCards().slice(0,S.settings.revCap);
  const nw=newCandidates(S.settings.newPerSession);
  queue=[...rev,...nw];sessTotal=queue.length;qIdx=0;sessDone=0;sessWrong=new Set();
  return queue.length>0;
}
function curWord(){return queue[qIdx];}
function requeue(w){queue.splice(Math.min(queue.length,qIdx+1+REQUEUE_GAP),0,w);}

async function showCard(){
  revealed=false;curAudio="";
  const w=curWord(),c=S.cards[cardKey(w)];

  el("sess-count").textContent=`第 ${sessDone+1} 張・佇列 ${queue.length-qIdx} 張`;
  el("sess-wrong").textContent=sessWrong.size?`答錯 ${sessWrong.size}`:"";
  el("sess-bar").style.width=Math.round(sessDone/Math.max(sessTotal,1)*100)+"%";

  const bTag=el("card-box"),lTag=el("card-lapse");
  if(!c){bTag.textContent="新字";bTag.className="boxtag new";}
  else{bTag.textContent=BOX_LABEL(c.box);bTag.className="boxtag";}
  const lapses=c?.wrong||0;
  if(lapses>0){
    lTag.textContent=`曾錯 ${lapses} 次 · 間隔 ×${LAPSE_MULT[Math.min(lapses,3)]}`;
    lTag.classList.remove("hidden");
  }else lTag.classList.add("hidden");

  el("en-word").textContent=w;el("en-word").classList.remove("sm");
  unmaskWord();
  el("en-phon").textContent="";el("audio-src").textContent="";
  el("btn-audio").classList.remove("human");
  el("zh-word").textContent="";el("zh-sub").textContent="";
  el("card-defs").innerHTML="";el("typing-fb").textContent="";
  el("typing-input").value="";
  el("mystery").classList.remove("hidden");
  el("reveal-section").classList.add("hidden");
  el("typing-row").classList.add("hidden");
  el("btn-typing").classList.remove("open");
  el("btn-typing").textContent="✏️ 測試拼字 (T)";
  el("grade-reveal").classList.remove("hidden");
  el("grade-answer").classList.add("hidden");

  if(S.deck==="medical"){
    const me=medE(w);
    el("card-dtag").textContent="🏥 醫學詞彙";el("card-dtag").className="ctag med";
    const catEl=el("card-cat");
    if(me?.cat){catEl.textContent=CAT_LBL[me.cat]||me.cat;catEl.classList.remove("hidden");}
    else catEl.classList.add("hidden");
    let rh=`醫學 #${MEDICAL.findIndex(m=>m.w===w)+1}`;
    if(me?.ab)rh+=`　縮寫: ${me.ab}`;
    el("rank-hint").textContent=rh;
  }else{
    el("card-dtag").textContent="📖 通用英文";el("card-dtag").className="ctag gen";
    el("card-cat").classList.add("hidden");
    el("rank-hint").textContent=`詞頻 RANK #${(WORDS.indexOf(w)+1).toLocaleString()}`;
  }

  const single=w.split(" ").length<=2;
  if(single){
    lookup(w).then(info=>{
      if(curWord()!==w)return;
      curAudio=info.audio;
      el("en-phon").textContent=info.phon||"";
      el("audio-src").textContent=info.audio?"真人錄音":"系統語音";
      el("btn-audio").classList.toggle("human",!!info.audio);
      setTimeout(()=>{if(curWord()===w)speak(w,info.audio);},400);
    });
  }else{
    setTimeout(()=>{if(curWord()===w)tts(w);},400);
  }
  if(queue[qIdx+1]&&queue[qIdx+1].split(" ").length<=2)lookup(queue[qIdx+1]);
}

async function reveal(){
  if(revealed)return;revealed=true;
  const w=curWord();
  el("en-word").classList.add("sm");
  el("mystery").classList.add("hidden");
  el("reveal-section").classList.remove("hidden");
  el("grade-reveal").classList.add("hidden");
  el("grade-answer").classList.remove("hidden");

  let zh="",sub="";
  if(S.deck==="medical"){
    const me=medE(w);zh=me?me.zh:w;sub=me?me.pos:"";
    if(me?.ab)sub+=` · 縮寫 ${me.ab}`;
  }else{
    zh=ZH[w]||"";
    if(!zh){
      el("zh-word").textContent="查詢中…";
      fetch("https://api.mymemory.translated.world/get?q="+encodeURIComponent(w)+"&langpair=en|zh-TW")
        .then(r=>r.json()).then(j=>{
          if(curWord()!==w||!revealed)return;
          const t=j.responseData?.translatedText||"";
          el("zh-word").textContent=(t&&t.toLowerCase()!==w)?t:"（見下方英文定義）";
        }).catch(()=>{if(curWord()===w&&revealed)el("zh-word").textContent="（見英文定義）";});
    }
  }
  if(zh)el("zh-word").textContent=zh;
  el("zh-sub").textContent=sub;

  el("card-defs").innerHTML='<div class="nodef">載入英文定義…</div>';
  if(w.split(" ").length<=2){
    const info=await lookup(w);
    if(curWord()!==w||!revealed)return;
    let h="";
    if(info.meanings.length){
      for(const m of info.meanings){
        h+=`<span class="pos">${m.pos}</span>`;
        h+=`<ul>${m.defs.map(d=>`<li>${esc(d)}</li>`).join("")}</ul>`;
      }
    }else{h='<div class="nodef">建議查閱線上字典</div>';}
    h+=`<a target="_blank" rel="noopener" href="https://dictionary.cambridge.org/dictionary/english-chinese-traditional/${encodeURIComponent(w)}">劍橋英漢字典 ↗</a>`;
    el("card-defs").innerHTML=h;
  }else{
    el("card-defs").innerHTML=`<a target="_blank" rel="noopener" href="https://dictionary.cambridge.org/dictionary/english-chinese-traditional/${encodeURIComponent(w)}">劍橋英漢字典 ↗</a>`;
  }
}

/* 遮蔽英文：拼字測試必須憑記憶，看著答案打字沒有意義 */
let masked=false;
function maskWord(){
  const w=curWord();
  el("en-mask").innerHTML=w.split("").map(c=>
    c===" "?'<span class="sp"></span>':(/[a-zA-Z0-9]/.test(c)?"_":esc(c))
  ).join("");
  el("en-word").classList.add("hidden");
  el("en-mask").classList.remove("hidden");
  el("en-mask-hint").classList.remove("hidden");
  masked=true;
}
function unmaskWord(){
  el("en-mask").classList.add("hidden");
  el("en-mask-hint").classList.add("hidden");
  el("en-word").classList.remove("hidden");
  masked=false;
}
function toggleTyping(){
  const row=el("typing-row"),btn=el("btn-typing");
  if(row.classList.contains("hidden")){
    row.classList.remove("hidden");btn.classList.add("open");
    btn.textContent="▲ 收起拼字";
    el("typing-fb").textContent="";el("typing-input").value="";
    maskWord();                       // 開啟即遮蔽
    el("typing-input").focus();
  }else{
    row.classList.add("hidden");btn.classList.remove("open");
    btn.textContent="✏️ 測試拼字 (T)";
    unmaskWord();                     // 收起即還原
  }
}
function checkTyping(){
  const inp=el("typing-input").value.trim().toLowerCase().replace(/\s+/g," ");
  const ans=curWord().toLowerCase().replace(/\s+/g," ");
  const me=S.deck==="medical"?medE(curWord()):null;
  const ok=inp===ans||(me?.ab&&inp===me.ab.toLowerCase());
  unmaskWord();                       // 確認後才揭曉正確拼字
  el("typing-fb").innerHTML=ok
    ?'<span class="ok-text">✓ 拼對了！</span>'
    :`<span class="no-text">✗ 你打的：</span> ${esc(el("typing-input").value.trim()||"（空白）")}　<span class="no-text">正確：</span> <strong>${esc(curWord())}</strong>`;
}
function answer(ok){
  if(!revealed)return;
  const w=curWord();
  grade(w,ok,sessWrong.has(w));      // 先問再記，順序不可調換
  if(!ok){sessWrong.add(w);requeue(w);}
  sessDone++;qIdx++;
  if(qIdx>=queue.length)finishSession();else showCard();
}
function finishSession(){
  S.stats.sessions++;
  const t=today();
  if(S.stats.lastDay===t){}
  else if(S.stats.lastDay===t-DAY)S.stats.streak++;
  else S.stats.streak=1;
  S.stats.lastDay=t;saveS();
  el("done-count").textContent=sessDone;
  el("done-detail").innerHTML=sessWrong.size
    ?`其中 <b>${sessWrong.size}</b> 字答錯 — 已排回 Box1，明天再考一次；<br>之後即使答對，間隔也永久縮短（不會拉到 30 天）`
    :"全數答對，間隔已拉長 🎉";
  el("done-next").textContent=dueCards().length?`今日仍有 ${dueCards().length} 字到期`:"今日到期已清空";
  show("view-done");
}

/* ── Home ── */
function renderHome(){
  const p=pfx();
  const cards=Object.entries(S.cards).filter(([k])=>k.startsWith(p)).map(([,v])=>v);
  el("stat-due").textContent=dueCards().length;
  el("stat-new").textContent=Math.min(S.settings.newPerSession,newCandidates(99).length);
  el("stat-mastered").textContent=cards.filter(c=>c.box===5).length;
  el("stat-total").textContent=cards.length;
  el("streak").textContent=S.stats.streak?`🔥 ${S.stats.streak} 天連續`:"開始第一回合";
  el("tab-gen").classList.toggle("active",S.deck==="general");
  el("tab-med").classList.toggle("active",S.deck==="medical");
  const counts=[0,0,0,0,0,0];cards.forEach(c=>counts[c.box]++);
  const mx=Math.max(1,...counts.slice(1));
  el("ladder").innerHTML=Array.from({length:5},(_,i)=>{
    const b=i+1;
    return`<div class="rung${b===5?" mastered":""}"><b>${counts[b]}</b><div class="bar" style="height:${Math.max(4,Math.round(counts[b]/mx*64))}px"></div><small>${BOX_SHORT(b)}</small><small>${BOX_DAYS[b]}天</small></div>`;
  }).join("");
  const lapsed=cards.filter(c=>(c.wrong||0)>0).length;
  el("lapse-note").innerHTML=lapsed
    ? `曾答錯過 <b>${lapsed}</b> 字 — 間隔已縮短，不會跟從未錯過的字一樣拉到 30 天`
    : "";
  const nothing=dueCards().length===0&&newCandidates(1).length===0;
  el("btn-start").disabled=nothing;
  el("btn-start").textContent=nothing?"今日已無到期／新字":"開始練習";
}

/* ── Export/Import ── */
function exportJSON(){
  const blob=new Blob([JSON.stringify({vocab:S},null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`gecko-grip-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importJSON(file){
  const r=new FileReader();
  r.onload=()=>{try{const j=JSON.parse(r.result);if(j.vocab?.cards)S=Object.assign(S,j.vocab);saveS();applyUI();renderHome();toast("✓ 進度已匯入");}catch(e){toast("格式錯誤");}};
  r.readAsText(file);
}

/* ── Utils ── */
function el(id){return document.getElementById(id);}
function show(id){["view-home","view-practice","view-done","view-settings"].forEach(v=>el(v).classList.add("hidden"));el(id).classList.remove("hidden");}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
let toastT;
function toast(msg){const t=el("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2600);}
function applyUI(){el("set-from").value=S.settings.from;el("set-to").value=S.settings.to;el("set-new").value=S.settings.newPerSession;el("set-rev").value=S.settings.revCap;el("set-accent").value=S.settings.accent;}

/* ── Events ── */
el("tab-gen").onclick=()=>{S.deck="general";saveS();renderHome();};
el("tab-med").onclick=()=>{S.deck="medical";saveS();renderHome();};
el("btn-start").onclick=()=>{if(buildSession()){show("view-practice");showCard();}};
el("btn-again").onclick=()=>{renderHome();if(buildSession()){show("view-practice");showCard();}else show("view-home");};
el("btn-home2").onclick=()=>{renderHome();show("view-home");};
el("btn-quit").onclick=()=>{renderHome();show("view-home");};
el("btn-settings").onclick=()=>{applyUI();show("view-settings");};
el("btn-save").onclick=()=>{
  let f=+el("set-from").value||101,t2=+el("set-to").value||3000;
  f=Math.max(1,Math.min(f,WORDS.length));t2=Math.max(f,Math.min(t2,WORDS.length));
  S.settings.from=f;S.settings.to=t2;
  S.settings.newPerSession=Math.max(0,Math.min(50,+el("set-new").value||10));
  S.settings.revCap=Math.max(5,Math.min(200,+el("set-rev").value||40));
  S.settings.accent=el("set-accent").value;
  saveS();renderHome();show("view-home");toast("設定已儲存");
};
el("btn-reveal").onclick=reveal;
el("btn-no").onclick=()=>answer(false);
el("btn-ok").onclick=()=>answer(true);
el("btn-audio").onclick=()=>speak(curWord(),curAudio);
el("btn-typing").onclick=toggleTyping;
el("btn-check").onclick=checkTyping;
el("typing-input").onkeydown=e=>{if(e.key==="Enter")checkTyping();};
el("btn-export").onclick=exportJSON;
el("btn-import").onclick=()=>el("file-import").click();
el("file-import").onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value="";};

document.addEventListener("keydown",e=>{
  if(el("view-practice").classList.contains("hidden"))return;
  if(document.activeElement===el("typing-input"))return;
  if(e.code==="Space"){e.preventDefault();if(!revealed)reveal();}
  else if(e.key==="1"&&revealed)answer(false);
  else if(e.key==="2"&&revealed)answer(true);
  else if(e.key==="p"||e.key==="P")speak(curWord(),curAudio);
  else if((e.key==="t"||e.key==="T")&&revealed)toggleTyping();
});

/* ── Init ── */
loadS();renderHome();
</script>
